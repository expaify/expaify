name: Fix Stripe Webhook Events

on:
  workflow_dispatch:

jobs:
  update-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Update live webhook endpoint events
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          set -euo pipefail
          curl -fsS https://api.stripe.com/v1/webhook_endpoints/we_1Toll52VkO1zH6JTq0ZZ4atN \
            -u "${STRIPE_SECRET_KEY}:" \
            -d "enabled_events[]=checkout.session.completed" \
            -d "enabled_events[]=customer.subscription.created" \
            -d "enabled_events[]=customer.subscription.updated" \
            -d "enabled_events[]=customer.subscription.deleted" \
            -d "enabled_events[]=invoice.payment_failed" \
            -o /tmp/stripe-webhook.json
          jq -r '.enabled_events[]' /tmp/stripe-webhook.json
