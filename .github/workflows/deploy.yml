name: Build and Deploy to Azure

on:
  push:
    branches: [main]

env:
  IMAGE: expaifyacr.azurecr.io/expaify:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: expaifyacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          EXISTS=$(az containerapp show --name expaify --resource-group expaify-rg --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name expaify \
              --resource-group expaify-rg \
              --environment expaify-env \
              --image ${{ env.IMAGE }} \
              --target-port 3000 \
              --ingress external \
              --min-replicas 1 \
              --registry-server expaifyacr.azurecr.io \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                "DUFFEL_KEY=${{ secrets.DUFFEL_KEY }}" \
                "AMADEUS_CLIENT_ID=${{ secrets.AMADEUS_CLIENT_ID }}" \
                "AMADEUS_CLIENT_SECRET=${{ secrets.AMADEUS_CLIENT_SECRET }}" \
              --output none
          else
            az containerapp registry set \
              --name expaify \
              --resource-group expaify-rg \
              --server expaifyacr.azurecr.io \
              --username ${{ secrets.ACR_USERNAME }} \
              --password ${{ secrets.ACR_PASSWORD }} \
              --output none
            az containerapp update \
              --name expaify \
              --resource-group expaify-rg \
              --image ${{ env.IMAGE }} \
              --set-env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                "DUFFEL_KEY=${{ secrets.DUFFEL_KEY }}" \
                "AMADEUS_CLIENT_ID=${{ secrets.AMADEUS_CLIENT_ID }}" \
                "AMADEUS_CLIENT_SECRET=${{ secrets.AMADEUS_CLIENT_SECRET }}" \
              --output none
          fi
