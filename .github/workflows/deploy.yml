name: Build and Deploy to Azure

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          EXISTS=$(az containerapp show --name expaify --resource-group expaify-rg --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name expaify \
              --resource-group expaify-rg \
              --environment expaify-env \
              --image ${{ env.IMAGE }} \
              --target-port 3000 \
              --ingress external \
              --min-replicas 1 \
              --registry-server ghcr.io \
              --registry-username ${{ github.actor }} \
              --registry-password ${{ secrets.GHCR_TOKEN }} \
              --env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              --output none
          else
            az containerapp registry set \
              --name expaify \
              --resource-group expaify-rg \
              --server ghcr.io \
              --username ${{ github.actor }} \
              --password ${{ secrets.GHCR_TOKEN }} \
              --output none
            az containerapp update \
              --name expaify \
              --resource-group expaify-rg \
              --image ${{ env.IMAGE }} \
              --set-env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              --output none
          fi
