name: Build and Deploy to Azure

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: expaifyacr.azurecr.io/expaify:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: expaifyacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=true

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          EXISTS=$(az containerapp show --name expaify --resource-group expaify-rg --query "name" -o tsv 2>/dev/null || true)

          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name expaify \
              --resource-group expaify-rg \
              --environment expaify-env \
              --image "${{ env.IMAGE }}" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 1 \
              --registry-server expaifyacr.azurecr.io \
              --registry-username "${{ secrets.ACR_USERNAME }}" \
              --registry-password "${{ secrets.ACR_PASSWORD }}" \
              --env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                "DUFFEL_KEY=${{ secrets.DUFFEL_KEY }}" \
                "AMADEUS_CLIENT_ID=${{ secrets.AMADEUS_CLIENT_ID }}" \
                "AMADEUS_CLIENT_SECRET=${{ secrets.AMADEUS_CLIENT_SECRET }}" \
                "SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}" \
                "BOOKING_ENABLED=true" \
                "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
                "AUTH_URL=${{ secrets.AUTH_URL }}" \
                "NEXTAUTH_URL=${{ secrets.AUTH_URL }}" \
                "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
                "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                "NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=true" \
                "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
                "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
                "STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}" \
                "STRIPE_PRICE_ANNUAL=${{ secrets.STRIPE_PRICE_ANNUAL }}" \
                "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
                "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" \
                "PIPELINE_SECRET=${{ secrets.PIPELINE_SECRET }}" \
                "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
                "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" \
              --output none
          else
            az containerapp update \
              --name expaify \
              --resource-group expaify-rg \
              --image "${{ env.IMAGE }}" \
              --set-env-vars \
                "TP_TOKEN=${{ secrets.TP_TOKEN }}" \
                "TP_AFFILIATE_MARKER=${{ secrets.TP_AFFILIATE_MARKER }}" \
                "REDIS_URL=${{ secrets.REDIS_URL }}" \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                "DUFFEL_KEY=${{ secrets.DUFFEL_KEY }}" \
                "AMADEUS_CLIENT_ID=${{ secrets.AMADEUS_CLIENT_ID }}" \
                "AMADEUS_CLIENT_SECRET=${{ secrets.AMADEUS_CLIENT_SECRET }}" \
                "SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}" \
                "BOOKING_ENABLED=true" \
                "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" \
                "AUTH_URL=${{ secrets.AUTH_URL }}" \
                "NEXTAUTH_URL=${{ secrets.AUTH_URL }}" \
                "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
                "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                "NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=true" \
                "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
                "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
                "STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}" \
                "STRIPE_PRICE_ANNUAL=${{ secrets.STRIPE_PRICE_ANNUAL }}" \
                "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
                "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" \
                "PIPELINE_SECRET=${{ secrets.PIPELINE_SECRET }}" \
                "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
                "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" \
              --output none
          fi
