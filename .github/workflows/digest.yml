name: Daily Digest Email

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily — after snapshot runs at 4am
  workflow_dispatch:       # allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily digest to premium subscribers
        env:
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
        run: |
          curl -fsSL --max-time 60 \
            -X POST https://expaify.com/api/alerts/digest \
            -H "Authorization: Bearer ${PIPELINE_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
